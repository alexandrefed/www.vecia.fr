# GitHub Actions Workflow for Astro Deployment to Vecia VPS (Docker)
# Migrated from PM2 to Docker for better reliability and automatic restarts

name: Deploy Astro to Vecia VPS (Docker)

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: vecia-website:${{ github.sha }},vecia-website:latest
          build-args: |
            NODE_VERSION=20.18.1
            PUBLIC_SITE_URL=https://vecia.fr
            PUBLIC_CAL_EMBED_URL=https://cal.vecia.fr
            PUBLIC_META_PIXEL_ID=${{ secrets.PUBLIC_META_PIXEL_ID }}
            PUBLIC_LINKEDIN_PARTNER_ID=${{ secrets.PUBLIC_LINKEDIN_PARTNER_ID }}
            PUBLIC_GA_MEASUREMENT_ID=${{ secrets.PUBLIC_GA_MEASUREMENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image to tar
        run: |
          echo "📦 Saving Docker image..."
          docker save vecia-website:latest | gzip > vecia-website.tar.gz
          ls -lh vecia-website.tar.gz
          echo "✅ Image saved"

      - name: Setup SSH key (decode base64 and validate)
        id: ssh_key
        run: |
          echo "====== Decoding and Validating SSH Key ======"
          mkdir -p ~/.ssh
          echo -n "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "Key fingerprint:"
          ssh-keygen -l -f ~/.ssh/deploy_key || echo "❌ Key validation failed"

          ssh-keyscan -H -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

          # Output decoded key for appleboy/ssh-action
          echo "decoded_key<<EOF" >> $GITHUB_OUTPUT
          cat ~/.ssh/deploy_key >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "✅ SSH key ready for deployment"

      - name: Transfer Docker image to VPS
        run: |
          echo "🚀 Transferring Docker image to VPS..."
          rsync -avz --progress \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            vecia-website.tar.gz \
            ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_TARGET_DIR }}/ \
          | tail -20
          echo "✅ Image transfer complete"

      - name: Transfer Docker Compose files to VPS
        run: |
          echo "📋 Transferring docker-compose.yml..."
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            docker-compose.yml \
            ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_TARGET_DIR }}/
          echo "✅ Compose file transferred"

      - name: Deploy with Docker Compose on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ steps.ssh_key.outputs.decoded_key }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ${{ secrets.VPS_TARGET_DIR }}

            echo "📥 Loading Docker image..."
            gunzip -c vecia-website.tar.gz | docker load

            echo "🔧 Creating/updating .env file..."
            # PUBLIC_SUPABASE_URL: External IP for client-side (browser) requests
            # SUPABASE_URL: Internal Docker network for server-side (SSR) requests
            cat > .env << EOF
            PUBLIC_SUPABASE_URL=http://85.25.172.125:8100
            PUBLIC_SUPABASE_ANON_KEY=${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
            SUPABASE_URL=http://supabase-kong:8000
            SUPABASE_ANON_KEY=${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
            PUBLIC_GA_MEASUREMENT_ID=${{ secrets.PUBLIC_GA_MEASUREMENT_ID }}
            PUBLIC_META_PIXEL_ID=${{ secrets.PUBLIC_META_PIXEL_ID }}
            PUBLIC_LINKEDIN_PARTNER_ID=${{ secrets.PUBLIC_LINKEDIN_PARTNER_ID }}
            EOF

            echo "🔄 Stopping existing container (any lifecycle)..."
            # Force-stop and remove the container by name before compose takes over.
            # docker compose down only tracks containers it launched; if the container
            # was started manually or by a previous workflow, it silently reports
            # "No resource found" and docker compose up then fails with a name conflict,
            # leaving the OLD (stale) container running.
            docker stop vecia-website 2>/dev/null || true
            docker rm vecia-website 2>/dev/null || true

            echo "🔄 Deploying with Docker Compose..."
            docker compose up -d

            echo "⏳ Waiting for container to be healthy..."
            timeout 90 bash -c 'until docker inspect vecia-website --format="{{.State.Health.Status}}" 2>/dev/null | grep -q "healthy"; do sleep 2; echo -n "."; done' || {
              echo ""
              echo "❌ Health check timeout!"
              echo "📋 Container status:"
              docker compose ps
              echo ""
              echo "🔴 Container logs:"
              docker compose logs --tail=100
              exit 1
            }

            echo ""
            echo "✅ Container is healthy!"

            # Clean up old images (keep last 2 versions)
            echo "🗑️  Cleaning up old Docker images..."
            docker image prune -f || true

            echo ""
            echo "=========================================="
            echo "✅ Deployment successful!"
            echo "=========================================="
            echo "📁 Deployed to: ${{ secrets.VPS_TARGET_DIR }}"
            echo "🐳 Container: vecia-website"
            echo "🌐 Website: https://vecia.fr"
            echo "📅 Deployed at: $(date)"
            echo ""
            echo "📊 Container status:"
            docker compose ps
            echo ""
            echo "💾 Resource usage:"
            docker stats vecia-website --no-stream

      - name: Verify Deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ steps.ssh_key.outputs.decoded_key }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # Port 4322 is only exposed to the Docker network, not to the host.
            # Use the container's internal IP for direct verification.
            CONTAINER_IP=$(docker inspect vecia-website --format '{{(index .NetworkSettings.Networks "caddy-public").IPAddress}}')
            echo "Container IP on caddy-public: $CONTAINER_IP"

            echo ""
            echo "🔍 Testing health endpoint (direct container)..."
            HEALTH_RESPONSE=$(curl -f -s "http://${CONTAINER_IP}:4322/api/health.json")

            if [ $? -eq 0 ]; then
              echo "✅ Health check passed"
              echo "Response: $HEALTH_RESPONSE"
            else
              echo "❌ Health check failed"
              docker compose logs --tail=50
              exit 1
            fi

            echo ""
            echo "🔍 Testing blog page rendering..."
            BLOG_CODE=$(curl -f -s -o /dev/null -w "%{http_code}" "http://${CONTAINER_IP}:4322/blog/pourquoi-vecia" || echo "000")
            if [ "$BLOG_CODE" = "200" ]; then
              echo "✅ Blog page renders correctly (HTTP $BLOG_CODE)"
            else
              echo "❌ Blog page failed with HTTP $BLOG_CODE"
              docker compose logs --tail=50
              exit 1
            fi

            echo ""
            echo "🔍 Testing site via Caddy (non-blocking)..."
            HTTP_CODE=$(curl -f -s -o /dev/null -w "%{http_code}" https://vecia.fr || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Caddy routing site successfully (HTTP $HTTP_CODE)"
            else
              echo "⚠️  Caddy returned HTTP $HTTP_CODE (may be OK if TLS cert is still provisioning)"
            fi

            echo ""
            echo "✅ All checks passed - Deployment verified!"

      - name: Cleanup VPS Stale Artifacts
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ steps.ssh_key.outputs.decoded_key }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "🗑️  Removing stale VPS Dockerfile (superceded by repo Dockerfile)..."
            # The VPS had an old Dockerfile that copied pre-built artifacts instead of
            # running npm build. This caused empty content-modules and blog crashes.
            # The correct Dockerfile is now deployed via docker load from CI.
            rm -f ${{ secrets.VPS_TARGET_DIR }}/Dockerfile
            rm -f ${{ secrets.VPS_TARGET_DIR }}/.dockerignore
            echo "✅ Stale Dockerfile removed"
